  <g stroke="#DCE7F1" stroke-width="1.4" opacity="0.7"><line x1="0" y1="75" x2="1600" y2="75"/><line x1="0" y1="150" x2="1600" y2="150"/><line x1="0" y1="225" x2="1600" y2="225"/><line x1="0" y1="300" x2="1600" y2="300"/><line x1="0" y1="375" x2="1600" y2="375"/><line x1="0" y1="450" x2="1600" y2="450"/><line x1="0" y1="525" x2="1600" y2="525"/><line x1="0" y1="600" x2="1600" y2="600"/><line x1="0" y1="675" x2="1600" y2="675"/><line x1="0" y1="750" x2="1600" y2="750"/><line x1="0" y1="825" x2="1600" y2="825"/></g>
