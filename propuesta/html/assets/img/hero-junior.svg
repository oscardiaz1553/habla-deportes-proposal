  <circle cx="105.75" cy="380.25" r="33.75" fill="#294D6E"/><path d="M94.275 366.075 L121.275 380.25 L94.275 394.425 Z" fill="#fff"/>
  <text x="158" y="395" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="27" fill="#294D6E" letter-spacing="3">JUNIOR FC · VIDEO</text>
