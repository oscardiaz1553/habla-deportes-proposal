      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDF1F5"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- bloque diagonal de marca muy suave -->
