    <line x1="640" y1="0" x2="640" y2="720"/>
    <circle cx="640" cy="360" r="94"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
  </g>
  <!-- etiqueta grande fantasma -->
  <text x="58" y="432" font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="83" fill="#BBD2E6" opacity="0.55" letter-spacing="-1">LIGA BETPLAY</text>
  <!-- ícono + kicker navy -->
  <circle cx="84.6" cy="304.2" r="27.0" fill="#294D6E"/><path d="M75.41999999999999 292.86 L97.02 304.2 L75.41999999999999 315.53999999999996 Z" fill="#fff"/>
  <text x="126" y="316" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="22" fill="#294D6E" letter-spacing="3">LIGA BETPLAY · RUEDA DE PRENSA</text>
